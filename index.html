<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>FitTrack — Accueil</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ===== EN-TÊTE ===== -->
  <header class="home-header">
    <div class="home-header__top">
      <p id="home-date" class="home-header__date"></p>
      <span id="home-mode-badge" class="home-mode-badge" hidden></span>
    </div>
    <p id="home-message" class="home-header__message">Chargement…</p>
    <p id="home-hint" class="home-header__hint"></p>
    <p id="home-goal-strip" class="home-goal-strip" hidden></p>
    <p id="home-weight-strip" class="home-weight-strip" hidden></p>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="home-main">

    <!-- ─── Bloc Musculation ─── -->
    <section class="home-card" id="home-muscu-card" aria-label="Musculation">
      <div class="home-card__head">
        <span class="home-card__head-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2"  y="10" width="3" height="4" rx="1"/>
            <rect x="19" y="10" width="3" height="4" rx="1"/>
            <rect x="5"  y="8"  width="3" height="8" rx="1"/>
            <rect x="16" y="8"  width="3" height="8" rx="1"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </span>
        <h2 class="home-card__title">Musculation</h2>
      </div>
      <div id="home-muscu-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

    <!-- ─── Bloc Alimentation ─── -->
    <section class="home-card" id="home-alim-card" aria-label="Alimentation">
      <div class="home-card__head">
        <span class="home-card__head-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3"/>
            <line x1="21" y1="15" x2="21" y2="22"/>
          </svg>
        </span>
        <h2 class="home-card__title">Alimentation</h2>
      </div>
      <div id="home-alim-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

    <!-- ─── Bloc Hydratation ─── -->
    <section class="home-card" id="home-hydra-card" aria-label="Hydratation">
      <div class="home-card__head">
        <span class="home-card__head-icon home-card__head-icon--water" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C6 9 4 13 4 16a8 8 0 0 0 16 0c0-3-2-7-8-14z"/>
          </svg>
        </span>
        <h2 class="home-card__title">Hydratation</h2>
      </div>
      <div id="home-hydra-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

  </main>

          <rect x="16" y="8"  width="3" height="8" rx="1"/>
          <line x1="8" y1="12" x2="16" y2="12"/>

      </span>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             width="24" height="24"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3"/>

      </span>
      <span class="nav-label">Alimentation</span>
    </a>

    <a href="profil.html" class="nav-item" aria-label="Mon profil">
      <span class="nav-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             width="24" height="24"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

      <span class="nav-label">Mon profil</span>
    </a>

  </nav>

  <script src="js/data.js"></script>

</body>
