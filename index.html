<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>FitTrack — Accueil</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ===== EN-TÊTE SALUTATION ===== -->
  <header class="home-header">
    <p id="home-date" class="home-header__date"></p>
    <p id="home-message" class="home-header__message">Chargement…</p>
    <p id="home-hint" class="home-header__hint"></p>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="home-main">

    <!-- ─── Bloc Musculation ─── -->
    <section class="home-card" id="home-muscu-card" aria-label="Musculation">
      <div class="home-card__head">
        <span class="home-card__head-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2"  y="10" width="3" height="4" rx="1"/>
            <rect x="19" y="10" width="3" height="4" rx="1"/>
            <rect x="5"  y="8"  width="3" height="8" rx="1"/>
            <rect x="16" y="8"  width="3" height="8" rx="1"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </span>
        <h2 class="home-card__title">Musculation</h2>
      </div>
      <div id="home-muscu-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

    <!-- ─── Bloc Alimentation ─── -->
    <section class="home-card" id="home-alim-card" aria-label="Alimentation">
      <div class="home-card__head">
        <span class="home-card__head-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3"/>
            <line x1="21" y1="15" x2="21" y2="22"/>
          </svg>
        </span>
        <h2 class="home-card__title">Alimentation</h2>
      </div>
      <div id="home-alim-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

    <!-- ─── Bloc Objectif (rendu seulement si profil configuré) ─── -->
    <section class="home-card" id="home-objectif-card" aria-label="Mon objectif" hidden>
      <div class="home-card__head">
        <span class="home-card__head-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
        </span>
        <h2 class="home-card__title">Mon objectif</h2>
      </div>
      <div id="home-objectif-block" class="home-card__body">
        <!-- Rendu par accueil.js -->
      </div>
    </section>

    <!-- ─── Pied de page ─── -->
    <p class="home-footer">FitTrack · données stockées localement</p>

  </main>

    <a href="alimentation/alimentation.html" class="nav-item" aria-label="Alimentation">

             width="24" height="24"

          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3"/>

      </span>

    <a href="profil.html" class="nav-item" aria-label="Mon profil">
      <span class="nav-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             width="24" height="24"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      </span>
      <span class="nav-label">Mon profil</span>

  <script src="js/data.js"></script>

</body>
